---
openapi: 3.0.1
info:
  title: Hatiwal API v1
  version: v1
  description: Local marketplace API for Afghanistan — no online payment, meetup-based
    transactions
paths:
  "/api/v1/listings":
    get:
      summary: browse active listings
      tags:
      - Listings
      description: Returns paginated active listings for buyers
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: category_id
        in: query
        required: false
        schema:
          type: integer
      - name: sort
        in: query
        required: false
        description: 'Sort order. Allowed values: newest (default), oldest, price_asc,
          price_desc, most_viewed, nearest. nearest requires latitude/longitude and
          falls back to newest when they are absent. Unknown values fall back to newest.'
        schema:
          type: string
      - name: latitude
        in: query
        required: false
        description: Buyer's latitude. Used for radius filtering and for sort=nearest.
        schema:
          type: number
      - name: longitude
        in: query
        required: false
        description: Buyer's longitude. Used for radius filtering and for sort=nearest.
        schema:
          type: number
      - name: radius
        in: query
        required: false
        description: Radius in kilometers — requires latitude and longitude.
        schema:
          type: number
      - name: seller_active_days
        in: query
        required: false
        description: When present, restricts results to listings whose seller's last_sign_in_at
          is within this many days. E.g. 7 returns listings from sellers active in
          the last week.
        schema:
          type: integer
      - name: price_dropped
        in: query
        required: false
        description: When present/true, restricts results to browsable listings with
          a recorded price reduction (listing_price_histories) within the last Listing::PRICE_DROP_WINDOW
          (14 days) — the same window used for the price-drop badge — the buyer 'Deals'
          filter.
        schema:
          type: boolean
      responses:
        '200':
          description: price_dropped=true composes with sort=nearest without a Postgres
            error
  "/api/v1/listings/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: saves_count reflects the number of SavedListing records (saved-by-N
        social proof)
      tags:
      - Listings
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      responses:
        '404':
          description: not found
        '200':
          description: saves_count is an integer, never a nested list of savers
  "/api/v1/listings/{id}/save":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: save a listing (bookmark)
      tags:
      - Listings
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: save is idempotent — saving twice still returns 200 and persists
            one record
        '401':
          description: unauthenticated user cannot save
  "/api/v1/listings/{id}/unsave":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: unsave a listing (remove bookmark)
      tags:
      - Listings
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: unsave is idempotent — calling when not saved still returns
            200
        '401':
          description: unauthenticated user cannot unsave
  "/api/v1/listings/{id}/similar":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: similar listings rail
      tags:
      - Listings
      description: Returns up to 8 browsable listings in the same category, excluding
        the source listing. Public — guests and authenticated users both have access.
      responses:
        '200':
          description: capped at 8 — creating 9 same-category active listings returns
            exactly 8
        '404':
          description: not found for non-existent listing
  "/api/v1/my/transactions":
    get:
      summary: list the caller's transactions (as buyer and/or seller)
      tags:
      - Transactions
      description: |
        Returns the current user's transactions — both the ones where they are
        the seller and the ones where they are the buyer. Optional `?as=buyer`
        or `?as=seller` narrows to a single role. TASK-TX01.
      parameters:
      - name: access-token
        in: header
        required: false
        schema:
          type: string
      - name: client
        in: header
        required: false
        schema:
          type: string
      - name: uid
        in: header
        required: false
        schema:
          type: string
      - name: as
        in: query
        required: false
        description: 'Optional role filter: ''buyer'' or ''seller'''
        schema:
          type: string
      responses:
        '401':
          description: unauthorized
        '200':
          description: "?as=seller narrows to transactions where the caller is the
            seller"
  "/api/v1/reports":
    get:
      summary: list the current user's reports
      tags:
      - Reports
      description: Returns a paginated list of reports submitted by the authenticated
        user. Includes status, reason, and a safe reportable_label.
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      responses:
        '401':
          description: requires authentication
        '200':
          description: pagination meta is present
    post:
      summary: submit a report
      tags:
      - Reports
      description: Submits a polymorphic report against a Listing or User.
      security:
      - bearer: []
      parameters:
      - name: access-token
        in: header
        required: true
        schema:
          type: string
      - name: client
        in: header
        required: true
        schema:
          type: string
      - name: uid
        in: header
        required: true
        schema:
          type: string
      responses:
        '401':
          description: requires authentication
        '201':
          description: creates a report
        '422':
          description: rejects reporting own listing
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                report:
                  type: object
                  properties:
                    reportable_type:
                      type: string
                      enum:
                      - Listing
                      - User
                    reportable_id:
                      type: integer
                    reason:
                      type: string
                    description:
                      type: string
                  required:
                  - reportable_type
                  - reportable_id
                  - reason
  "/api/v1/users/{user_id}/sold_listings":
    get:
      summary: list a seller's sold listings (public)
      tags:
      - Users
      description: |
        Returns a paginated list of sold listings for any publicly-active seller.
        Works for guests — authentication is optional. Returns 404 when the
        seller account has been deleted or is pending deletion.
      parameters:
      - name: user_id
        in: path
        required: true
        description: Seller's user ID
        schema:
          type: integer
      - name: page[number]
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      - name: access-token
        in: header
        required: false
        schema:
          type: string
      - name: client
        in: header
        required: false
        schema:
          type: string
      - name: uid
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: returns only that seller's sold listings (authenticated)
        '404':
          description: seller not found
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: api.hatiwal.com
- url: http://localhost:3007
  description: Local development
components:
  securitySchemes:
    bearer:
      type: apiKey
      name: access-token
      in: header
