# =============================================================================
# DEVELOPMENT ONLY — use with: docker compose up
# For production deployment, use Kamal: kamal deploy
# =============================================================================

x-dev-app: &dev-app
  build:
    context: "."
    dockerfile: "Dockerfile.dev"
    target: "app"
    args:
      - "RAILS_ENV=${RAILS_ENV:-development}"
      - "RUBY_VERSION=3.4.8"
  image: "hatiwal-api:dev"
  env_file:
    - ".env"
  restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
  stop_grace_period: "3s"
  volumes:
    - ".:/rails/"
  tty: true
  stdin_open: true
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    redis:
      condition: service_healthy

services:
  postgres:
    image: "postgres:16"
    restart: unless-stopped
    environment:
      - "POSTGRES_PASSWORD=password"
      - "POSTGRES_DB=hatiwal_development"
      - "POSTGRES_USER=hatiwal"
    volumes:
      - "postgres:/var/lib/postgresql/data"
    ports:
      - "5407:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatiwal -d hatiwal_development"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: "redis:7-alpine"
    restart: unless-stopped
    command: "redis-server"
    ports:
      - "6307:6379"
    volumes:
      - "redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    <<: *dev-app
    environment:
      - "RAILS_ENV=development"
      - "DATABASE_URL=postgres://hatiwal:password@postgres:5432/hatiwal_development"
      - "REDIS_URL=redis://redis:6379/0"
      - "ACTION_CABLE_URL=ws://localhost:3098/hatiwal-cable"
    ports:
      - "0.0.0.0:3007:3007"
    command: bash -c "rm -f tmp/pids/server.pid && bundle install && bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0 -p 3007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Dedicated ActionCable server — decouples WebSocket from HTTP handling.
  # Mobile app connects to ws://host:3098/hatiwal-cable
  cable:
    <<: *dev-app
    environment:
      - "RAILS_ENV=development"
      - "DATABASE_URL=postgres://hatiwal:password@postgres:5432/hatiwal_development"
      - "REDIS_URL=redis://redis:6379/0"
      - "ACTION_CABLE_URL=ws://localhost:3098/hatiwal-cable"
    ports:
      - "0.0.0.0:3098:3098"
    command: bash -c "bundle install && bundle exec puma -p 3098 cable/config.ru"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres:
  redis:
