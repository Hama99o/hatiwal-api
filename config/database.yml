default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://hatiwal:password@localhost:5407/hatiwal_development") %>

test:
  <<: *default
  # DATABASE_URL (used by development) takes precedence over the `database:` key,
  # which would make the test suite run against — and wipe — the development DB.
  # Reuse the same host/credentials from DATABASE_URL but force a dedicated test DB.
  url: <%= require "uri"; u = URI.parse(ENV.fetch("DATABASE_URL", "postgres://hatiwal:password@localhost:5407/hatiwal_development")); u.path = "/hatiwal_test"; u.to_s %>

production:
  primary: &primary_production
    <<: *default
    host:     <%= ENV.fetch("DATABASE_HOST", "localhost") %>
    port:     <%= ENV.fetch("DATABASE_PORT", 5432) %>
    username: <%= ENV.fetch("DATABASE_USERNAME", "hatiwal") %>
    password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
    database: hatiwal_production
  cache:
    <<: *primary_production
    database: hatiwal_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: hatiwal_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: hatiwal_production_cable
    migrations_paths: db/cable_migrate
