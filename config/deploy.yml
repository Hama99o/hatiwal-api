# Kamal deployment configuration for hatiwal_api
#
# Co-hosted on one OVH VPS (host/domains in .env.production) with multi_magic and
# edu_safi, in a fully isolated Docker network (hatiwal_api-net). kamal-proxy routes
# by hostname, so there are no HTTP port conflicts. The accessory HOST ports,
# however, must be unique per app — already taken:
#   multi_magic → PG 5432 / Redis 6379
#   edu_safi    → PG 5433 / Redis 6380
#   hatiwal_api → PG 5434 / Redis 6381  ← this app
service: hatiwal_api

image: <%= ENV.fetch("KAMAL_IMAGE", "hama99o/hatiwal_api") %>

servers:
  web:
    hosts:
      - <%= ENV.fetch("KAMAL_HOST") %>
    options:
      network: hatiwal_api-net

proxy:
  ssl: true
  host: <%= ENV.fetch("KAMAL_PROXY_HOST") %>
  app_port: 80
  healthcheck:
    path: /up
    interval: 5

ssh:
  user: <%= ENV.fetch("SSH_USER", "kamal") %>
  keys_only: true
  keys:
    - <%= ENV.fetch("SSH_KEY_PATH", "~/.ssh/id_ed25519") %>

registry:
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME", "hama99o") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD
    - DEVISE_JWT_SECRET_KEY
    - APP_DOMAIN
    - CABLE_ALLOWED_ORIGINS
    - POSTMARK_API_TOKEN
    - WEB_RESET_URL
    # Google OAuth credentials are in config/credentials.yml.enc — not env vars
  clear:
    DATABASE_HOST: hatiwal_api-db
    DATABASE_PORT: 5432
    DATABASE_USERNAME: hatiwal
    REDIS_URL: redis://hatiwal_api-redis:6379/0
    RAILS_LOG_TO_STDOUT: true
    SOLID_QUEUE_IN_PUMA: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
  migrate: app exec "bin/rails db:migrate"
  seed: app exec "bin/rails db:seed"

volumes:
  - "hatiwal_api_storage:/rails/storage"

builder:
  dockerfile: Dockerfile
  arch: amd64
  driver: docker

accessories:
  db:
    image: postgres:16
    host: <%= ENV.fetch("KAMAL_HOST") %>
    # Host port 5434 avoids multi_magic (5432) and edu_safi (5433). Bound to
    # 127.0.0.1 so Postgres is never exposed to the public internet.
    port: "127.0.0.1:5434:5432"
    options:
      network: hatiwal_api-net
    env:
      clear:
        POSTGRES_USER: hatiwal
        POSTGRES_DB: hatiwal_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    host: <%= ENV.fetch("KAMAL_HOST") %>
    # Host port 6381 avoids multi_magic (6379) and edu_safi (6380).
    port: "127.0.0.1:6381:6379"
    options:
      network: hatiwal_api-net
    directories:
      - data:/data
    cmd: redis-server --appendonly yes
